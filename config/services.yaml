services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            $botToken: '%env(TELEGRAM_BOT_TOKEN)%'
            $botUsername: '%env(TELEGRAM_BOT_USERNAME)%'

    Morfeditorial\MachinimaBotBundle\Screens\:
        resource: '../src/Screens/'

    Morfeditorial\MachinimaBotBundle\Commands\:
        resource: '../src/Commands/'

    Morfeditorial\MachinimaBotBundle\Service\:
        resource: '../src/Service/'
        public: true

    Morfeditorial\MachinimaBotBundle\Twig\BotLinkExtension:
        tags:
            - 'twig.extension'

    Morfeditorial\MachinimaBotBundle\Translator:
        public: true

    bot_translator:
        alias: Morfeditorial\MachinimaBotBundle\Translator
        public: true
